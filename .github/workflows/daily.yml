name: daily-shishimaru

# 朝刊配信(10:00 JST手動送信)からの逆算:
#   夕方便 18:00 JST(=09:00 UTC)      … 前営業日の市況＋夜の市況報道で新聞を生成
#   朝便   07:00 JST(=22:00 UTC前日)  … 前営業日の市況＋夜間報道で、日本語要点リスト＋新聞＋メール文面を用意
#                                        (出社前に確実に完成させる。Actionsは数分〜15分遅延しうるため早めに設定)
#   → 弓場さん 出社(〜8:20)で要点を見てカード化 → 目視 → 10:00手動送信に間に合わせる
on:
  schedule:
    - cron: '0 9 * * 1-5'     # 夕方便 18:00 JST
    - cron: '0 22 * * 0-4'    # 朝便   07:00 JST（=22:00 UTC前日/日曜〜木曜）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 取得→解釈→ニュース収集(無料翻訳・日本語要点リスト)→図解
        shell: pwsh
        run: |
          ./scripts/fetch_vn30.ps1
          ./scripts/interpret.ps1
          ./scripts/collect_news.ps1   # 無料翻訳でJP要点リスト(news_raw)を用意。カード化は人が後で
          ./scripts/render_zukai.ps1

      - name: Chrome 準備（PNG用）
        id: chrome
        continue-on-error: true
        uses: browser-actions/setup-chrome@v1

      - name: 静止版PNG書き出し（失敗しても続行）
        continue-on-error: true
        shell: pwsh
        run: |
          $asof = (Get-ChildItem outputs/vn30_*.interpreted.json | Sort-Object Name -Descending | Select-Object -First 1).Name -replace 'vn30_','' -replace '\.interpreted\.json',''
          $html = (Resolve-Path "outputs/vn30_$asof.html").Path
          $png  = "outputs/vn30_$asof.png"
          $chrome = "${{ steps.chrome.outputs.chrome-path }}"
          if (-not $chrome) { $chrome = "google-chrome" }
          & $chrome --headless=new --no-sandbox --disable-gpu --hide-scrollbars --force-device-scale-factor=2 --window-size=1100,1750 --screenshot="$png" "--virtual-time-budget=4000" ("file://" + $html)
          if (Test-Path $png) { Write-Host "PNG OK: $png" } else { Write-Host "PNG skip" }

      - name: 朝刊メール文面を生成（新聞PNGをインライン埋め込み）
        shell: pwsh
        run: ./scripts/build_email.ps1

      - name: コミット＆プッシュ（生成物を日付別に蓄積）
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs docs
          if git diff --cached --quiet; then
            echo "変更なし（休場/同日再実行）→ コミットしない"
          else
            git commit -m "daily: $(date -u +%Y-%m-%d) ししまるベトナム新聞 自動生成"
            git push
          fi
