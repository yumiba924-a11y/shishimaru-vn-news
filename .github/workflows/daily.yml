name: daily-shishimaru

# 毎営業日 18:00 JST（=09:00 UTC）に自動生成。手動トリガーも可。
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 取得→解釈→ニュース収集→自動要約→図解
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # 未設定なら要約スキップ（雛形のまま新聞は出る）
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}                 # 任意。既定 claude-sonnet-4-6
        run: |
          ./scripts/fetch_vn30.ps1
          ./scripts/interpret.ps1
          ./scripts/collect_news.ps1
          ./scripts/summarize_news.ps1
          ./scripts/render_zukai.ps1

      - name: Chrome 準備（PNG用）
        id: chrome
        continue-on-error: true
        uses: browser-actions/setup-chrome@v1

      - name: 静止版PNG書き出し（失敗しても続行）
        continue-on-error: true
        shell: pwsh
        run: |
          $asof = (Get-ChildItem outputs/vn30_*.interpreted.json | Sort-Object Name -Descending | Select-Object -First 1).Name -replace 'vn30_','' -replace '\.interpreted\.json',''
          $html = (Resolve-Path "outputs/vn30_$asof.html").Path
          $png  = "outputs/vn30_$asof.png"
          $chrome = "${{ steps.chrome.outputs.chrome-path }}"
          if (-not $chrome) { $chrome = "google-chrome" }
          & $chrome --headless=new --no-sandbox --disable-gpu --hide-scrollbars --force-device-scale-factor=2 --window-size=1100,1750 --screenshot="$png" "--virtual-time-budget=4000" ("file://" + $html)
          if (Test-Path $png) { Write-Host "PNG OK: $png" } else { Write-Host "PNG skip" }

      - name: コミット＆プッシュ（生成物を日付別に蓄積）
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs docs
          if git diff --cached --quiet; then
            echo "変更なし（休場/同日再実行）→ コミットしない"
          else
            git commit -m "daily: $(date -u +%Y-%m-%d) ししまるベトナム新聞 自動生成"
            git push
          fi
