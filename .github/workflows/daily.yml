name: daily-collect-for-weekly

# ししまる日次新聞は休刊(2026-07)。この日次Actionsは「週次 Vietnam Weekly 用のデータ・ニュース工場」として稼働する。
# 各営業日の確定市況(VN-Index・騰落・セクター・外国人フロー)＋現地ニュース要点(news_raw)を毎日蓄積し、
# 月曜の週次制作を「良質な素材から組むだけ」にする。
# → 月曜一括取得は時間がかかり・間違いが出て・粒度も落ちる。だから日次で漏れなく吸い上げておく(弓場さん方針2026-07)。
#   夕方便 18:00 JST(=09:00 UTC)     … その日の確定市況＋日中ニュースを収集(市況データの主軸)
#   朝便   07:00 JST(=22:00 UTC前日) … 前夜〜早朝ニュースを補足収集(ニュース網羅性のため。市況は前日分の再確認)
on:
  schedule:
    - cron: '0 9 * * 1-5'     # 夕方便 18:00 JST(確定市況＋ニュース)
    - cron: '0 22 * * 0-4'    # 朝便   07:00 JST(ニュース補足)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: データ取得→解釈(寄与度・外国人フロー)→ニュース収集(無料翻訳・要点リスト)
        shell: pwsh
        run: |
          ./scripts/fetch_vn30.ps1       # VN30/指数＋外国人フロー(foreigns: net_val/room)を取得
          ./scripts/interpret.ps1        # 寄与度(weight×pct)・HOSE breadth・foreign素通し → interpreted.json
          ./scripts/collect_news.ps1     # 現地4紙を無料翻訳 → news_raw(週次⑥トピックスの素材)

      - name: コミット＆プッシュ(週次用データ・ニュースを日付別に蓄積)
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs            # データ・ニュースのみ蓄積。docs(旧日次新聞の最終号)は触らない
          if git diff --cached --quiet; then
            echo "変更なし(休場/同日再実行)→ コミットしない"
          else
            git commit -m "collect: $(date -u +%Y-%m-%d) 週次用データ・ニュース蓄積"
            git push
          fi
